<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" fill="none">
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji"; font-size: 13px; fill: #8b949e; font-weight: 500; }
    .text { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace; font-size: 14px; fill: #c9d1d9; }
    .cmd { fill: #58a6ff; font-weight: bold; }
    .output { fill: #8b949e; }
    .highlight { fill: #ff7b72; font-weight: bold; }
    .cursor { fill: #58a6ff; animation: blink 1s step-end infinite; }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
  
  <!-- Window Background -->
  <rect width="800" height="240" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  
  <!-- Window Title Bar -->
  <path d="M1 8C1 4.13401 4.13401 1 8 1H792C795.866 1 799 4.13401 799 8V32H1V8Z" fill="#161b22" stroke="#30363d" stroke-dasharray="0,0,0,800"/>
  <line x1="1" y1="32" x2="799" y2="32" stroke="#30363d" stroke-width="1"/>
  
  <!-- Window Control Buttons (macOS-style) -->
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  
  <!-- Window Title -->
  <text x="400" y="21" text-anchor="middle" class="title">sharad@macos:~</text>

  <!-- Terminal Input/Output Lines -->
  <g transform="translate(25, 60)">
    <!-- Command 1 -->
    <text x="0" y="20" class="text"><tspan class="cmd">sharad ~ %</tspan> whoami</text>
    <!-- Output 1 -->
    <text x="0" y="45" class="text output">> Self-taught builder designing premium macOS apps &amp; systems.</text>
    
    <!-- Command 2 -->
    <text x="0" y="80" class="text"><tspan class="cmd">sharad ~ %</tspan> cat stack.json</text>
    <!-- Output 2 -->
    <text x="0" y="105" class="text output">{ "desktop": ["SwiftUI", "SwiftData"], "systems": ["Rust", "Go", "Docker"] }</text>
    
    <!-- Command 3 -->
    <text x="0" y="140" class="text"><tspan class="cmd">sharad ~ %</tspan> launch <tspan class="highlight">ziro</tspan> --theme=anime<tspan class="cursor">█</tspan></text>
  </g>
</svg>
