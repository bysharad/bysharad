<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260" fill="none">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1f242c" stroke-width="1"/>
    </pattern>
    
    <!-- Text Gradients -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
    
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>

    <!-- Glowing Ambient Light -->
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 38px; font-weight: 800; fill: url(#title-grad); letter-spacing: -1px; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #8b949e; }
    .tag { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 12px; font-weight: 600; fill: url(#accent-grad); }
    .code-box { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 11px; fill: #c9d1d9; }
    .code-comment { fill: #8b949e; }
    .code-keyword { fill: #ff7b72; }
    .code-fn { fill: #d2a8ff; }
    .code-str { fill: #a5d6ff; }
    .code-num { fill: #f0883e; }
  </style>

  <!-- Background Fill -->
  <rect width="800" height="260" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  
  <!-- Grid Layer -->
  <rect width="800" height="260" rx="8" fill="url(#grid)"/>

  <!-- Glow Effect -->
  <rect width="800" height="260" rx="8" fill="url(#glow)"/>

  <!-- Brand Section -->
  <g transform="translate(45, 80)">
    <text x="0" y="0" class="tag">SYSTEMS // DESKTOP // AI</text>
    <text x="0" y="42" class="title">SHARAD.</text>
    <text x="0" y="70" class="subtitle">Designing high-performance tools and native experiences.</text>
  </g>

  <!-- Code Visualization Window (Right side) -->
  <g transform="translate(440, 40)">
    <!-- Window Outline -->
    <rect width="315" height="180" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
    <!-- Code Dots -->
    <circle cx="16" cy="14" r="4" fill="#ff5f56"/>
    <circle cx="28" cy="14" r="4" fill="#ffbd2e"/>
    <circle cx="40" cy="14" r="4" fill="#27c93f"/>
    
    <!-- Code Text -->
    <g transform="translate(16, 42)" class="code-box">
      <text x="0" y="0" class="code-comment">// Concurrent Web Indexing Pipeline</text>
      <text x="0" y="18"><tspan class="code-keyword">fn</tspan> <tspan class="code-fn">crawl_and_index</tspan>(url: <tspan class="code-keyword">&amp;str</tspan>) {</text>
      <text x="15" y="36"><tspan class="code-keyword">let</tspan> client = Crawler::<tspan class="code-fn">new</tspan>();</text>
      <text x="15" y="54"><tspan class="code-keyword">let</tspan> page = client.<tspan class="code-fn">fetch</tspan>(url).<tspan class="code-keyword">await</tspan>?;</text>
      <text x="15" y="72">IndexBuilder::<tspan class="code-fn">default</tspan>()</text>
      <text x="30" y="90">.<tspan class="code-fn">field</tspan>(<tspan class="code-str">"title"</tspan>, page.title)</text>
      <text x="30" y="108">.<tspan class="code-fn">field</tspan>(<tspan class="code-str">"body"</tspan>, page.body)</text>
      <text x="30" y="126">.<tspan class="code-fn">commit</tspan>()?;</text>
      <text x="0" y="144">}</text>
    </g>
  </g>
</svg>
